name: writing sync

# Rebuilds the writing list in index.html from the anvilwright RSS feed, between
# the WRITING markers. Runs daily and on demand. Commits only when it changes.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/sync_writing.py
      - name: commit changes
        run: |
          if ! git diff --quiet index.html; then
            git config user.name "writing-sync"
            git config user.email "actions@users.noreply.github.com"
            git add index.html
            git commit -m "sync writing list from feed"
            git push
          else
            echo "no changes"
          fi
